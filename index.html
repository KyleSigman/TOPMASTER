<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет мастера</title>

    <style>
        /* style.css */

/* ===== НЕОМОРФИЗМ ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #d9e0ec;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 1rem;
}

        /* Красивый скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 
                inset 0.1rem 0.1rem 0.2rem rgba(255,255,255,0.9),
                inset -0.1rem -0.1rem 0.2rem rgba(0,0,0,0.1);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 1);
        }

/* ===== ЭКРАН АВТОРИЗАЦИИ ===== */
.auth-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #d9e0ec;
}

.auth-card {
    background: #ecf1f8;
    border-radius: 2rem;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    outline: 2px solid #a8b5cd27;
    box-shadow: 
        -0.7rem -0.7rem 1.2rem #ffffff7a,
        0.9rem 0.9rem 1.8rem #a8b5cd,
        inset -0.2rem -0.2rem 0.5rem #c0cde0,
        inset 0.3rem 0.3rem 0.6rem #ffffff;
}

.auth-card h2 {
    text-align: center;
    color: #2c3e4f;
    margin-bottom: 2rem;
    font-size: 1.5rem;
}

.auth-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    background: #eaf0fa;
    padding: 0.3rem;
    border-radius: 3rem;
    box-shadow: 
        inset 0.1rem 0.1rem 0.3rem #a8b5cd,
        inset -0.1rem -0.1rem 0.3rem #ffffff;
}

.auth-tab {
    flex: 1;
    padding: 0.8rem;
    border: none;
    background: transparent;
    border-radius: 2rem;
    font-weight: 600;
    color: #4d5f84;
    cursor: pointer;
    transition: all 0.1s ease;
}

.auth-tab.active {
    background: #eaf0fa;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
}

.form-group {
    margin-bottom: 1.2rem;
}

.form-label {
    display: block;
    color: #4d5f84;
    margin-bottom: 0.3rem;
    font-weight: 500;
}

.form-input, .form-textarea {
    width: 100%;
    padding: 0.8rem 1rem;
    background: #eaf0fa;
    border: none;
    border-radius: 1rem;
    font-size: 1rem;
    box-shadow: 
        inset 0.1rem 0.1rem 0.3rem #a8b5cd,
        inset -0.1rem -0.1rem 0.3rem #ffffff;
    outline: none;
    color: #2c3e4f;
}

.form-textarea {
    min-height: 100px;
    resize: vertical;
}

.auth-btn {
    width: 100%;
    background: #4d5f84;
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 2rem;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 
        0.3rem 0.3rem 0.6rem #a8b5cd,
        -0.2rem -0.2rem 0.4rem #ffffff;
    transition: all 0.1s ease;
    margin-top: 1rem;
}

.auth-btn:hover {
    transform: translateY(-0.2rem);
}

.auth-btn:active {
    transform: translateY(0.1rem);
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

.auth-error {
    color: #e74c3c;
    text-align: center;
    margin-top: 1rem;
    font-size: 0.9rem;
}

/* ===== КАБИНЕТ ===== */
.cabinet {
    max-width: 1000px;
    margin: 0 auto;
}

.header {
    position: absolute;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    background: #15572400;
    padding-right: 10px;
    right: 0;
}

.header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #2c3e4f;
    text-shadow: 0.2rem 0.2rem 0.4rem #bac4d4;
}

.logout-btn {
    position: absolute;
    background: #eaf0fa;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 2rem;
    font-weight: 600;
    color: #4d5f84;
    cursor: pointer;
    box-shadow: 
        -0.3rem -0.3rem 0.6rem #ffffff,
        0.4rem 0.4rem 0.8rem #a8b5cd;
    transition: all 0.1s ease;
}

.logout-btn:hover {
    transform: translateY(-0.2rem);
}

.logout-btn:active {
    transform: translateY(0.1rem);
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

/* ===== ПРОФИЛЬ МАСТЕРА ===== */
.master-profile {
    background: #eaf0fa;
    border-radius: 2rem;
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 
        -0.7rem -0.7rem 1.2rem #ffffff7a,
        0.9rem 0.9rem 1.8rem #a8b5cd;
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
}

.master-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #a0c0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: white;
    box-shadow: 
        0.3rem 0.3rem 0.6rem #a8b5cd,
        -0.2rem -0.2rem 0.4rem #ffffff;
}

.master-info {
    flex: 1;
}

.master-name-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
}

.master-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: #2c3e4f;
}

.rating {
    background: #d0dbe8;
    padding: 0.3rem 0.8rem;
    border-radius: 2rem;
    font-weight: 600;
    color: #2c3e4f;
    font-size: 0.9rem;
    box-shadow: 
        inset 0.1rem 0.1rem 0.2rem #a8b5cd,
        inset -0.1rem -0.1rem 0.2rem #ffffff;
}

.status {
    font-size: 0.9rem;
    font-weight: 600;
}

.specialization {
    color: #4d5f84;
}

/* ===== ВКЛАДКИ ===== */
.tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    border: 2px dashed #4d5f8415;
    /* background: #eaf0fa; */
    padding: 0.5rem;
    border-radius: 1.5rem;
    /* box-shadow: 
        inset 0.1rem 0.1rem 0.3rem #a8b5cd,
        inset -0.1rem -0.1rem 0.3rem #ffffff; */
    overflow-x: auto;
}

.tab {
    flex: 1;
    min-width: 100px;
    padding: 1rem;
    border: none;
    background: transparent;
    border-radius: 3rem;
    font-weight: 600;
    color: #4d5f84;
    cursor: pointer;
    transition: all 0.1s ease;
    white-space: nowrap;
}

.tab.active {
    background: #eaf0fa;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
    color: #2c3e4f;
}

/* ===== КОНТЕНТ ===== */
.content-panel {
    background: transparent;  /* прозрачный - виден фон body */
    padding: 0;               /* убираем отступы */
    box-shadow: none;         /* убираем объем */
    border-radius: 0;         /* убираем скругление */
}

.loading {
    text-align: center;
    color: #8a9bb8;
    padding: 2rem;
}

.empty-state {
    text-align: center;
    color: #8a9bb8;
    padding: 2rem;
}

/* ===== ПРАЙС ===== */
.price-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.price-header h2 {
    color: #2c3e4f;
    font-size: 1.3rem;
}

.add-category-btn {
    background: #eaf0fa;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 2rem;
    font-weight: 600;
    color: #4d5f84;
    cursor: pointer;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
}

.service-category {
    margin-bottom: 2rem;
}

.category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    /* border-bottom: 2px solid #d0dbe8; */
}

.category-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2c3e4f;
}

.category-actions {
    display: flex;
    gap: 0.5rem;
}

.action-btn {
    background: #eaf0fa;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 
        -0.2rem -0.2rem 0.3rem #ffffff,
        0.2rem 0.2rem 0.3rem #a8b5cd;
    color: #4d5f84;
}

.service-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 0;
    border-bottom: 1px dashed #d0dbe8;
}

.service-item:last-child {
    border-bottom: none;
}

.service-name {
    color: #4d5f84;
}

.service-price {
    font-weight: 700;
    color: #2c3e4f;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

/* ===== КАЛЕНДАРЬ ===== */
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
}

.nav-btn {
    background: #eaf0fa;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
    color: #4d5f84;
}

.month-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #2c3e4f;
}

.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    text-align: center;
    font-weight: 600;
    color: #4d5f84;
    padding: 0.5rem 0;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.5rem;
    margin-bottom: 2rem;
}

.calendar-day {
    aspect-ratio: 1;
    background: #eaf0fa;
    border-radius: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
    transition: all 0.1s ease;
    font-size: 1.1rem;
    font-weight: 600;
    color: #2c3e4f;
}

.calendar-day:hover {
    transform: translateY(-0.2rem);
}

.calendar-day.active {
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

.day-details {
    background: #eaf0fa;
    border-radius: 1.5rem;
    padding: 1.5rem;
    box-shadow: 
        inset 0.1rem 0.1rem 0.3rem #a8b5cd,
        inset -0.1rem -0.1rem 0.3rem #ffffff;
}

.selected-date {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2c3e4f;
    margin-bottom: 1rem;
}

.slots-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
}

.slot-card {
    background: #eaf0fa;
    border-radius: 1rem;
    padding: 1rem;
    border: 2px dashed rgba(136, 150, 165, 0.27);
    /* box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd; */
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.slot-time {
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c3e4f;
    min-width: 60px;
}

.slot-info {
    flex: 1;
    min-width: 150px;
}

.slot-title {
    font-weight: 600;
    color: #2c3e4f;
    margin-bottom: 0.2rem;
}

.slot-subtitle {
    font-size: 0.85rem;
    color: #4d5f84;
}

.slot-status {
    padding: 0.3rem 0.8rem;
    border-radius: 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
}

.status-busy {
    background: #e74c3c20;
    color: #c0392b;
}

.status-free {
    background: #2ecc7120;
    color: #27ae60;
}

.slot-actions {
    display: flex;
    gap: 0.3rem;
}

.slot-btn {
    background: #eaf0fa;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 0.9rem;
    cursor: pointer;
    box-shadow: 
        -0.1rem -0.1rem 0.2rem #ffffff,
        0.1rem 0.1rem 0.2rem #a8b5cd;
    color: #4d5f84;
}

/* ===== ЧАТЫ ===== */
.chat-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
}

.chat-item {
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 10px;
    margin-bottom: 3px;
    border-radius: 1.5rem;
    background: #eaf0fa;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
    cursor: pointer;
    transition: all 0.1s ease;
}

.chat-item:hover {
    transform: translateY(-0.2rem);
}

.chat-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #a0c0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: white;
}

.chat-info {
    flex: 1;
}

.chat-name-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.2rem;
}

.chat-name {
    font-weight: 700;
    color: #2c3e4f;
}

.chat-time {
    font-size: 0.8rem;
    color: #8a9bb8;
}

.chat-preview {
    font-size: 0.9rem;
    color: #4d5f84;
    display: flex;
    justify-content: space-between;
}

.unread-badge {
    background: #4d5f84;
    color: white;
    padding: 0.2rem 0.5rem;
    border-radius: 1rem;
    font-size: 0.7rem;
    font-weight: 600;
}

/* ===== ПРОФИЛЬ (редактирование) ===== */
.profile-form {
    max-width: 600px;
    margin: 0 auto;
}

.save-profile-btn {
    width: 100%;
    background: #4d5f84;
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 2rem;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 
        0.3rem 0.3rem 0.6rem #a8b5cd,
        -0.2rem -0.2rem 0.4rem #ffffff;
    margin-top: 1rem;
}

/* ===== АДАПТИВ ===== */
@media (max-width: 600px) {
    .master-profile {
        flex-direction: column;
        text-align: center;
    }
    
    .master-name-row {
        justify-content: center;
    }
    
    .tabs {
    margin: 1rem 1rem 2rem 1rem;  /* добавить отступы */
        flex-wrap: wrap;
    }
    
    .tab {
        min-width: calc(50% - 0.5rem);
    }
    
    .slot-card {
        flex-direction: column;
        align-items: flex-start;
    }
    
    .slot-actions {
        align-self: flex-end;
    }

}

    /* ===== СТИЛИ ДЛЯ ПРАЙС-БИЛДЕРА (неоморфные инпуты) ===== */

/* Поля ввода названия категории */
.category-title input {
    background: #eaf0fa;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 2rem;
    font-size: 1.2rem;
    font-weight: 700;
    color: #2c3e4f;
    /* box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff; */
    outline: none;
    width: auto;
    min-width: 200px;
}

/* Поле ввода названия услуги */
.service-name input {
    background: #eaf0fa;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    font-size: 1rem;
    color: #4d5f84;
    /* box-shadow: 
        inset 0.1rem 0.1rem 0.2rem #a8b5cd,
        inset -0.1rem -0.1rem 0.2rem #ffffff; */
    outline: none;
    width: 200px;
}

/* Поле ввода цены */
.service-price input {
    background: #eaf0fa;
    border: none;
    padding: 0.4rem 0.8rem;
    border-radius: 2rem;
    font-size: 1rem;
    font-weight: 600;
    color: #2c3e4f;
    text-align: right;
    /* box-shadow: 
        inset 0.1rem 0.1rem 0.2rem #a8b5cd,
        inset -0.1rem -0.1rem 0.2rem #ffffff; */
    outline: none;
    width: 100px;
}

/* Убираем стрелки у number input */
.service-price input[type=number]::-webkit-inner-spin-button,
.service-price input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.service-price input[type=number] {
    -moz-appearance: textfield;
}

/* Кнопки действий (редактировать/удалить) */
.action-btn {
    background: #eaf0fa;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.2rem 0.2rem 0.4rem #a8b5cd;
    color: #4d5f84;
    transition: all 0.1s ease;
}

.action-btn:active {
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

/* Кнопка добавления услуги */
.add-service-btn {
    background: #eaf0fa;
    border: 1px dashed #4d5f84;
    padding: 0.8rem 1.5rem;
    border-radius: 3rem;
    font-weight: 500;
    color: #4d5f84;
    cursor: pointer;
    width: 100%;
    margin-top: 0.8rem;

}
.add-service-btn:hover {
    border: 1px dashed #4d5f8400;
    /* Мягкий объем как у клиентских плашек */
    box-shadow: 
        -0.4rem -0.4rem 0.8rem #ffffff34,
        0.5rem 0.5rem 1.2rem #a8b5cd,
        inset -0.1rem -0.1rem 0.3rem #c0cde0,
        inset 0.2rem 0.2rem 0.4rem #ffffff;
    
    transition: all 0.1s ease;

}


.add-service-btn:active {
    box-shadow: 
        -0.2rem -0.2rem 0.4rem #ffffff,
        0.3rem 0.3rem 0.8rem #a8b5cd,
        inset 0.2rem 0.2rem 0.5rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}


.add-service-btn:active {
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

/* Кнопка добавления категории */
.add-category-btn {
    background: #eaf0fa;
    border: 2px dashed #a8b5cd;
    padding: 1rem;
    border-radius: 3rem;
    font-weight: 600;
    color: #4d5f84;
    cursor: pointer;
    box-shadow: 
        -0.3rem -0.3rem 0.6rem #ffffff,
        0.3rem 0.3rem 0.6rem #a8b5cd;
    width: 100%;
    margin-top: 1rem;
    transition: all 0.1s ease;
}

.add-category-btn:active {
    box-shadow: 
        inset 0.2rem 0.2rem 0.4rem #a8b5cd,
        inset -0.2rem -0.2rem 0.4rem #ffffff;
}

/* Категория (карточка) */
.service-category {
    background: #eaf0fa;
    border-radius: 2rem;
    margin-bottom: 1.5rem;
    padding: 1rem;
    box-shadow: 
        -0.5rem -0.5rem 1rem #ffffff,
        0.5rem 0.5rem 1rem #a8b5cd;
    overflow: hidden;
}

/* Заголовок категории */
.category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem;
    cursor: pointer;
    border-radius: 1rem;
}

/* Список услуг внутри категории */
.services-list {

                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.senderId === window.currentMasterKey ? 'master' : 'client'}`;
                    
                    const time = msg.timestamp 
                        ? new Date(msg.timestamp).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
                        : '';
                    
                    msgDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                            <span style="font-weight: bold;">${msg.senderId === window.currentMasterKey ? 'Я' : 'Клиент'}</span>
                            <span style="font-size: 0.7rem; opacity: 0.7;">${time}</span>
                        </div>
                        <div>${msg.text}</div>
                    `;
                    
                    messagesDiv.appendChild(msgDiv);
                });
                
                // Скроллим вниз
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, (error) => {
                console.error('❌ Ошибка подписки на сообщения:', error);
                messagesDiv.innerHTML = '<div class="message">Ошибка загрузки сообщений</div>';
            });

            // Загружаем чек-билдер (пока оставляем как есть)
            subscribeToCheckout(chatId);
        };
    
        window.closeMasterChat = function() {
            const chatList = document.getElementById('chatList');
            chatList.style.display = 'block';
            
            const container = document.getElementById('activeChatContainer');
            if (container) {
                container.remove();
            }
        };
                // ===== ЗАГРУЗКА СООБЩЕНИЙ ЧАТА (REALTIME) =====
        window.loadMasterMessages = function(chatId) {
            console.log('📥 Подписка на сообщения чата:', chatId);
            
            const messagesDiv = document.getElementById('masterChatMessages');
            if (!messagesDiv) {
                console.error('❌ masterChatMessages не найден');
                return;
            }
            
            // Показываем загрузку
            messagesDiv.innerHTML = '<div class="message">Загрузка сообщений...</div>';
            
            // Создаем реф на сообщения
            const messagesRef = ref(window.rtdb, `chats/${chatId}/messages`);
            
            // Подписываемся (предыдущая подписка автоматически отпишется при повторном вызове)
            onValue(messagesRef, (snapshot) => {
                console.log('📥 onValue сообщения сработал');
                
                messagesDiv.innerHTML = ''; // Очищаем
                
                if (!snapshot.exists()) {
                    messagesDiv.innerHTML = '<div class="message">Нет сообщений</div>';
                    return;
                }
                
                // Преобразуем объект в массив и сортируем по времени
                const messages = [];
                snapshot.forEach((child) => {
                    messages.push({ id: child.key, ...child.val() });
                });
                
                // Сортируем от старых к новым (для правильного отображения)
                messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                
                // Отрисовываем
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.senderId === window.currentMasterKey ? 'master' : 'client'}`;
                    
                    const time = msg.timestamp 
                        ? new Date(msg.timestamp).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
                        : '';
                    
                    msgDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                            <span style="font-weight: bold;">${msg.senderId === window.currentMasterKey ? 'Я' : 'Клиент'}</span>
                            <span style="font-size: 0.7rem; opacity: 0.7;">${time}</span>
                        </div>
                        <div>${msg.text}</div>
                    `;
                    
                    messagesDiv.appendChild(msgDiv);
                });
                
                // Скроллим вниз
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
            }, (error) => {
                console.error('❌ Ошибка подписки на сообщения:', error);
                messagesDiv.innerHTML = '<div class="message">Ошибка загрузки сообщений</div>';
            });
        };

        window.sendMasterMessage = function(chatId) {
            const input = document.getElementById('masterChatInput');
            const text = input.value.trim();
            
            if (!text || !chatId) return;
            
            console.log('📤 Отправка сообщения:', text, 'в чат:', chatId);
            
            const message = {
                senderId: window.currentMasterKey,
                text: text,
                timestamp: Date.now(),
                read: false
            };
            
            fetch(`https://creator-75dac-default-rtdb.europe-west1.firebasedatabase.app/chats/${chatId}/messages.json`, {
    method: 'POST',
    body: JSON.stringify(message)
})
            .then(r => r.json())
            .then(() => {
                console.log('✅ Сообщение отправлено');
                
                // Обновляем lastMessage
                const lastMessage = {
                    text: text,
                    timestamp: Date.now(),
                    senderId: window.currentMasterKey,
                    read: false
                };
                
                return fetch(`https://creator-75dac-default-rtdb.europe-west1.firebasedatabase.app/chats/${chatId}.json`, {
    method: 'PATCH',
    body: JSON.stringify({ lastMessage: lastMessage })
});
            })
            .then(() => {
                input.value = '';
                // ВАЖНО: перезагружаем сообщения после отправки
                window.loadMasterMessages(chatId);
            })
            .catch(err => {
                console.error('❌ Ошибка отправки:', err);
            });
        };
        // ===== ПОДПИСКА НА ЧЕК-БИЛДЕР (REALTIME) =====
        window.subscribeToCheckout = function (chatId) {
            console.log('📥 Подписка на чек-билдер чата:', chatId);

            const container = document.getElementById('masterCheckoutItems');
            const totalSpan = document.getElementById('masterTotalValue');

            if (!container || !totalSpan) {
                console.error('❌ Элементы чек-билдера не найдены');
                return;
            }

            const checkoutRef = ref(window.rtdb, `chats/${chatId}/checkout`);

            onValue(checkoutRef, (snapshot) => {
                console.log('📥 onValue чек-билдера сработал');

                const data = snapshot.val();
                container.innerHTML = '';

                if (!data || !data.items) {
                    container.innerHTML = '<div class="empty-state">Нет услуг</div>';
                    totalSpan.textContent = '0 ₽';
                    return;
                }

                let total = 0;

                Object.entries(data.items).forEach(([name, item]) => {
                    if (item.status === 'pending' || item.status === 'approved') {
                        total += item.price;

                        const div = document.createElement('div');
                        div.className = 'checkout-item';  // ТОЛЬКО КЛАСС, БЕЗ ИНЛАЙН-СТИЛЕЙ

                        const isApproved = item.status === 'approved';
                        const isDisabled = isApproved ? 'disabled' : '';

                        div.innerHTML = `
                <div class="checkout-item-content">
                    <input type="checkbox" 
                        ${item.status === 'pending' ? 'checked' : ''}
                        ${isDisabled}
                        data-service-name="${name}"
                        class="checkout-checkbox">
                    <span class="checkout-item-name ${isApproved ? 'approved' : ''}">
                        ${name}
                    </span>
                </div>
                <div class="checkout-item-price-wrapper">
                    <span class="checkout-item-price">${item.price.toLocaleString()} ₽</span>
                </div>
            `;

                        if (!isApproved) {
                            div.addEventListener('click', (e) => {
                                if (e.target.tagName !== 'INPUT') {
                                    const checkbox = div.querySelector('input[type="checkbox"]');
                                    if (checkbox && !checkbox.disabled) {
                                        const event = new Event('change', { bubbles: true });
                                        checkbox.dispatchEvent(event);
                                    }
                                }
                            });

                            const checkbox = div.querySelector('input[type="checkbox"]');
                            checkbox.addEventListener('change', () => {
                                toggleMasterCheckbox(div);
                            });
                        }

                        container.appendChild(div);
                    }
                });

                totalSpan.textContent = total.toLocaleString() + ' ₽';

                        // ===== НОВЫЙ БЛОК: отображение даты и времени =====
    if (data.schedule && (data.schedule.date || data.schedule.time)) {
        const dateDiv = document.createElement('div');
        dateDiv.className = 'checkout-datetime';
        
        const dateStr = data.schedule.date 
            ? new Date(data.schedule.date).toLocaleDateString('ru') 
            : 'дата не выбрана';
        const timeStr = data.schedule.time || 'время не указано';
        
        dateDiv.innerHTML = `
            <div style="display: flex; align-items: center; gap: 8px; justify-content: center;">
                <span>📅</span>
                <span style="font-weight: 500;">${dateStr}</span>
                <span>⏰</span>
                <span style="font-weight: 500;">${timeStr}</span>
            </div>
        `;
        
        container.appendChild(dateDiv);
    }

                // Статус тоже лучше через класс
                const statusDiv = document.createElement('div');
                statusDiv.className = `checkout-status ${data.status}`;
                statusDiv.textContent = data.status === 'approved' ? '✅ Чек утвержден' : '⏳ Чек в процессе обсуждения';
                container.appendChild(statusDiv);

            }, (error) => {
                console.error('❌ Ошибка подписки на чек-билдер:', error);
                container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            });
        };

// ===== КЛИК ПО ЧЕКБОКСУ (мастер) =====

window.toggleMasterCheckbox = function(element) {
    const checkbox = element.querySelector('input[type="checkbox"]');
    checkbox.checked = !checkbox.checked;
    updateMasterTotal();
    
    if (window.currentChatId) {
        saveMasterCheckoutToRTDB();
    }
};

// ===== ОБНОВЛЕНИЕ СУММЫ (мастер) =====

window.updateMasterTotal = function() {
    let total = 0;
    document.querySelectorAll('#masterCheckoutItems .checkout-item input:checked').forEach(cb => {
        const priceText = cb.closest('.checkout-item').querySelector('.checkout-item-price').textContent;
        const price = parseInt(priceText.replace(/[^\d]/g, ''));
        total += price;
    });
    document.getElementById('masterTotalValue').textContent = total.toLocaleString() + ' ₽';
};

// ===== СОХРАНЕНИЕ ЧЕКА В БАЗУ (мастер) =====
window.saveMasterCheckoutToRTDB = function() {
    try {
        const items = {};
        let total = 0;
        
        document.querySelectorAll('#masterCheckoutItems .checkout-item').forEach(item => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            const nameElement = item.querySelector('.checkout-item-name');
            
            if (!nameElement) throw new Error('Не найден .checkout-item-name');
            
            const name = nameElement.textContent.trim();
            const priceText = item.querySelector('.checkout-item-price').textContent;
            const price = parseInt(priceText.replace(/[^\d]/g, ''));
            
            items[name] = {
                price: price,
                status: checkbox.checked ? 'pending' : 'removed'
            };
            
            if (checkbox.checked) total += price;
        });
        
        const checkoutData = {
            items: items,
            total: total,
            status: "pending",
            updatedAt: Date.now(),
            updatedBy: window.currentMasterKey
        };
        
        console.log('💾 Мастер сохраняет чек-билдер:', JSON.stringify(checkoutData));
        
        const checkoutRef = ref(window.rtdb, `chats/${window.currentChatId}/checkout`);
        set(checkoutRef, checkoutData)
            .then(() => {
                console.log('✅ Чек-билдер сохранен мастером');
            })
            .catch(err => {
                console.error('❌ Ошибка set:', err);
            });
    } catch (err) {
        console.error('❌ Ошибка формирования данных:', err);
    }
};

        window.approveCheckout = function(chatId) {
            const checkoutRef = ref(rtdb, `chats/${chatId}/checkout`);
            
            onValue(checkoutRef, (snapshot) => {
                const checkout = snapshot.val();
                if (!checkout) return;
                
                Object.keys(checkout.items || {}).forEach(name => {
                    if (checkout.items[name].status === 'pending') {
                        checkout.items[name].status = 'approved';
                    }
                });
                
                checkout.status = 'approved';
                checkout.updatedAt = Date.now();
                checkout.updatedBy = window.currentMasterKey;
                
                set(checkoutRef, checkout).then(() => {
                    console.log('✅ Чек утвержден');
                    
                    const msgRef = push(ref(rtdb, `chats/${chatId}/messages`));
                    set(msgRef, {
                        senderId: window.currentMasterKey,
                        text: '✅ Чек утвержден',
                        timestamp: Date.now(),
                        read: false
                    });
                });
            }, { onlyOnce: true });
        };
    
        window.rejectCheckout = function(chatId) {
            const msgRef = push(ref(rtdb, `chats/${chatId}/messages`));
            set(msgRef, {
                senderId: window.currentMasterKey,
                text: '❌ Чек отклонен, нужно обсудить',
                timestamp: Date.now(),
                read: false
            });
        };
    
        console.log('🚀 Приложение готово к работе');

    </script>
